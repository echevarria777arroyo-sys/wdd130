<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>White Water Rafting | Contact Us</title>
    <meta name="description" content="Get in touch with our team for questions about your next white water rafting adventure.">
    <link rel="stylesheet" href="styles/rafting.css">
</head>
<body>
    <header>
        <img src="images/logo.png" alt="Rafting Logo" class="logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>
        <h1>Contact Us</h1>
        <section class="contact-form-section">
            <form>
                <div class="form-item">
                    <label for="username">Name:</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="form-item">
                    <label for="useremail">Email:</label>
                    <input type="email" id="useremail" name="useremail" required>
                </div>
                <div class="form-item">
                    <label for="message">Message:</label>
                    <textarea id="message" name="message" rows="4"></textarea>
                </div>
                <button type="submit" class="cta-btn">Send Message</button>
            </form>
        </section>

        <section class="contact-team">
            <h2>We Are Here to Serve You</h2>
            <div class="team-container">
                <div class="team-member">
                    <img src="images/guide.jpg" alt="Operations Manager">
                    <p><strong>Teagan Lawson</strong><br>Operations Manager</p>
                </div>
                <div class="team-member">
                    <img src="images/rafting.jpg" alt="Lead Guide">
                    <p><strong>Chris Morris</strong><br>Lead Guide</p>
                </div>
                <div class="team-member">
                    <img src="images/outdoor_manager.jpg" alt="Customer Service">
                    <p><strong>Jane Doe</strong><br>Customer Service</p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>© 2026 White Water Rafting | Melissa Elena Echevarria Arroyo</p>
        <div class="social">
            <a href="#"><img src="images/facebook.png" alt="Facebook"></a>
            <a href="#"><img src="images/twitter.png" alt="Twitter"></a>
            <a href="#"><img src="images/instagram.png" alt="Instagram"></a>
        </div>
    </footer>
</body>
</html>
