<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | White Water Rafting Co.</title>
    <meta name="description" content="Contact White Water Rafting Co. for reservations, general inquiries, or feedback. We are located in Salmon River, Idaho.">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/logo.png" alt="Rafting Company Logo">
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About Us</a>
            <a href="trips.html">Trips</a>
            <a href="contact.html">Contact Us</a>
        </nav>
    </header>

    <main>
        <section class="contact-header">
            <h1>White Water Rafting Company</h1>
            <p>123 Adventure Way, Salmon River, ID 83467</p>
            <p>+1 999 999 9999</p>
            <p>info@whitewater.com</p>
        </section>

        <div class="contact-grid">
            <!-- Columna Izquierda: Mapa -->
            <section class="map">
                <iframe
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2836.467!2d-113.904!3d45.176!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x53585a4a5a5a5a5a%3A0x5a5a5a5a5a5a5a5a!2sSalmon%20River!5e0!3m2!1sen!2sus!4v1620000000000"
                    allowfullscreen="" loading="lazy"></iframe>
            </section>

            <!-- Columna Derecha: Formulario -->
            <section class="contact-form-container">
                <form action="#" method="post">
                    <div class="form-item">
                        <label for="user_name">Name</label>
                        <input type="text" id="user_name" name="user_name" placeholder="Name" required>
                    </div>

                    <div class="form-item">
                        <label for="user_email">Email</label>
                        <input type="email" id="user_email" name="user_email" placeholder="Email" required>
                    </div>

                    <fieldset>
                        <legend>Message Purpose</legend>
                        <label><input type="radio" name="purpose" value="general" checked> General Inquiry</label>
                        <label><input type="radio" name="purpose" value="reservation"> Reservation Question</label>
                        <label><input type="radio" name="purpose" value="suggestion"> Website Suggestion</label>
                    </fieldset>

                    <div class="form-item">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="4" placeholder="Type here"></textarea>
                    </div>

                    <div class="form-item-checkbox">
                        <input type="checkbox" id="newsletter" name="newsletter">
                        <label for="newsletter">Please Subscribe me to the monthly newsletter</label>
                    </div>

                    <button type="submit">Get in Touch!</button>
                </form>
            </section>
        </div>

        <section class="employees-section">
            <h2>We Are Here to Serve You</h2>
            <div class="employee-grid">
                <figure>
                    <img src="images/outdoor_manager.jpg" alt="Operations Manager">
                    <figcaption>Teagan Lawson - Operations Manager</figcaption>
                </figure>
                <figure>
                    <img src="images/instructor.jpg" alt="Lead Guide">
                    <figcaption>Chris Waters - Lead Guide</figcaption>
                </figure>
                <figure>
                    <img src="images/guide.jpg" alt="Safety Coordinator">
                    <figcaption>Alex River - Safety Coordinator</figcaption>
                </figure>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 | White Water Rafting Co. | Melissa Elena Echevarria Arroyo</p>
        <div class="social">
            <a href="https://facebook.com"><img src="images/facebook.png" alt="Facebook"></a>
            <a href="https://twitter.com"><img src="images/twitter.png" alt="Twitter"></a>
            <a href="https://instagram.com"><img src="images/instagram.png" alt="Instagram"></a>
        </div>
    </footer>
</body>
</html>
